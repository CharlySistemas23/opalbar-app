<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPALBAR - Escanea con Expo Go</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0D0D0F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #F4F4F5;
        }
        .container {
            text-align: center;
            background: #1a1a1d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
            color: #E45858;
        }
        p {
            margin: 0 0 30px 0;
            font-size: 16px;
            color: #B4B4BB;
        }
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 0 auto 30px;
        }
        .url {
            font-size: 14px;
            color: #7A7A82;
            font-family: monospace;
            margin-top: 20px;
            padding: 10px;
            background: #0D0D0F;
            border-radius: 6px;
            border-left: 3px solid #E45858;
        }
        .instructions {
            margin-top: 30px;
            text-align: left;
            background: #0D0D0F;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
        }
        .instructions li {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 OPALBAR</h1>
        <p>Abre Expo Go en tu teléfono y escanea el código QR:</p>

        <div id="qrcode"></div>

        <div class="url">
            exp://192.168.100.13:8081
        </div>

        <div class="instructions">
            <strong>Pasos:</strong>
            <ol>
                <li>Abre <strong>Expo Go</strong> en tu teléfono</li>
                <li>Toca el icono de <strong>+</strong> o <strong>Scan QR</strong></li>
                <li>Apunta a este código QR</li>
                <li>¡La app se abrirá en segundos!</li>
            </ol>
        </div>
    </div>

    <script>
        // Generar QR con la URL de Expo
        const qrcode = new QRCode("qrcode", {
            text: "exp://192.168.100.13:8081",
            width: 300,
            height: 300,
            colorDark: "#0D0D0F",
            colorLight: "#FFFFFF",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
