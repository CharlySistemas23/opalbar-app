# ─────────────────────────────────────────────
#  OPALBAR — CI/CD Pipeline
#  Triggers: push to main/develop + PRs
# ─────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

permissions:
  actions: read
  contents: read
  checks: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint & Format ─────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx prettier --check "apps/**/*.ts" "libs/**/*.ts"

      - name: Lint API
        run: npx nx lint api

      - name: TypeScript check API
        run: npx tsc --project apps/api/tsconfig.json --noEmit

  # ── Unit Tests ────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx nx test api --coverage --passWithNoTests
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Build ─────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build API
        run: npx nx build api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: dist/apps/api/
          retention-days: 1

  # ── E2E Tests ─────────────────────────────
  e2e:
    name: 🔬 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opalbar
          POSTGRES_PASSWORD: opalbar_secret
          POSTGRES_DB: opalbar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          npx prisma generate
          npx prisma db push --force-reset
          npx prisma db seed
        env:
          DATABASE_URL: postgresql://opalbar:opalbar_secret@localhost:5432/opalbar_test?schema=public

      - name: Run E2E tests
        run: npx nx e2e api-e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://opalbar:opalbar_secret@localhost:5432/opalbar_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: e2e_access_secret_min_32_chars_test_ok
          JWT_REFRESH_SECRET: e2e_refresh_secret_min_32_chars_test_ok
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: test@opalbar.com
          SMTP_PASS: test
          EMAIL_FROM: OPALBAR Test <test@opalbar.com>
          ADMIN_EMAIL: admin@opalbar.com
          ADMIN_PASSWORD: Admin@123456

  # ── Docker Build & Push ───────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
